title: VAG Component Protection — Right to Repair Documentation
description: >
  Open documentation of Volkswagen Group Component Protection:
  how it works, which modules are affected, and what vehicle owners
  and independent repairers need to know.
baseurl: "/VAG-CP-Docs"
url: "https://dspl1236.github.io"

# Use the bundled primer theme (no remote_theme needed)
theme: jekyll-theme-primer

# Plugins (all bundled with github-pages)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Relative links
relative_links:
  enabled: true
  collections: true

readme_index:
  enabled: true

optional_front_matter:
  enabled: true
  remove_originals: false

titles_from_headings:
  enabled: true
  strip_title: true

# Exclude non-doc files
exclude:
  - LICENSE
  - CONTRIBUTING.md
  - "technical/certs"
